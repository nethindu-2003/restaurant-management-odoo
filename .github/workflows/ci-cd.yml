name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Odoo Tests
    runs-on: ubuntu-latest
    env:
      UV_PYTHON_DOWNLOADS: never

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U odoo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsasl2-dev libldap2-dev

      - name: Install dependencies
        run: |
          uv sync
          
      - name: Install Odoo dependencies
        run: |
          # Install odoo requirements using uv in the virtual environment
          uv pip install -r odoo/requirements.txt
          
          # Ensure some testing dependencies are present
          uv pip install psycopg2-binary coverage

      - name: Prepare clean test database
        env:
          PGHOST: localhost
          PGUSER: odoo
          PGPASSWORD: odoo
        run: |
          # Drop any leftover test_db from a previous run and create it fresh.
          # This prevents duplicate key violations caused by stale data.
          psql -h localhost -U odoo -d postgres -c "DROP DATABASE IF EXISTS test_db;"
          psql -h localhost -U odoo -d postgres -c "CREATE DATABASE test_db OWNER odoo;"

      - name: Run Odoo Tests
        env:
          PGHOST: localhost
          PGUSER: odoo
          PGPASSWORD: odoo
        run: |
          # Create temporary directories for CI test data
          mkdir -p /tmp/odoo_data /tmp/odoo_screenshots

          # Run tests on the freshly created test_db.
          # --without-demo=all prevents demo data loading which can cause constraint collisions.
          # Explicitly pass DB credentials to prevent Odoo defaulting to the OS user (root).
          uv run ./odoo/odoo-bin -c odoo.conf \
            --db_host=localhost \
            --db_user=odoo \
            --db_password=odoo \
            -d test_db \
            -i restaurant_management \
            --test-enable \
            --stop-after-init \
            --without-demo=all \
            --addons-path=odoo/addons,custom_addons \
            --data-dir=/tmp/odoo_data \
            --screenshots=/tmp/odoo_screenshots


  deploy:
    name: Deploy to AWS Lightsail
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USERNAME }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            # Navigate to the project directory
            # Make sure to change this to the actual path on your Lightsail instance!
            cd /opt/odoo/restaurant-management-odoo
            
            # Pull latest changes
            git pull origin main
            
            # Update dependencies if needed
            uv sync
            
            # Update the Odoo module
            uv run ./odoo/odoo-bin -c odoo.conf -d your_production_db -u restaurant_management --stop-after-init --addons-path=odoo/addons,custom_addons
            
            # Restart Odoo service
            sudo systemctl restart odoo
