name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1: Static Analysis
  # Validates all Python and XML files in the custom module without needing a
  # running Odoo server. This is fast, reliable, and catches real bugs early.
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    env:
      UV_PYTHON_DOWNLOADS: never

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff (linter)
        run: uv pip install --system ruff

      # ── Python: syntax check ──────────────────────────────────────────────
      - name: Check Python syntax (compile check)
        run: |
          echo "Checking Python syntax in custom_addons/..."
          find custom_addons/ -name "*.py" -print0 | xargs -0 python -m py_compile
          echo "✅ All Python files are syntactically valid."

      # ── Python: lint with Ruff ────────────────────────────────────────────
      - name: Lint Python with Ruff
        run: |
          echo "Running Ruff linter on custom_addons/..."
          # Use Odoo's own ruff config as the standard, with select/ignore overrides
          # E501 (line too long) and some style rules are ignored for Odoo compatibility
          ruff check custom_addons/ \
            --select=E,F,W \
            --ignore=E501,E302,E303,E266,W291,W293 \
            --output-format=github
          echo "✅ Ruff linting passed."

      # ── XML: validate all view/data files ────────────────────────────────
      - name: Validate XML files
        run: |
          echo "Validating XML files in custom_addons/..."
          sudo apt-get install -y libxml2-utils > /dev/null 2>&1
          find custom_addons/ -name "*.xml" -print0 | while IFS= read -r -d '' file; do
            xmllint --noout "$file" 2>&1 && echo "  ✅ $file" || { echo "  ❌ $file"; exit 1; }
          done
          echo "✅ All XML files are valid."

      # ── Module manifest check ─────────────────────────────────────────────
      - name: Validate __manifest__.py
        run: |
          echo "Validating Odoo module manifest..."
          python - <<'EOF'
          import ast, sys, pathlib

          manifests = list(pathlib.Path("custom_addons").rglob("__manifest__.py"))
          if not manifests:
              print("❌ No __manifest__.py found!")
              sys.exit(1)

          required_keys = ["name", "version", "depends"]
          for m in manifests:
              try:
                  data = ast.literal_eval(m.read_text())
              except Exception as e:
                  print(f"❌ Could not parse {m}: {e}")
                  sys.exit(1)

              missing = [k for k in required_keys if k not in data]
              if missing:
                  print(f"❌ {m} is missing required keys: {missing}")
                  sys.exit(1)

              print(f"  ✅ {m} — name={data['name']!r}, version={data.get('version','?')!r}")
          print("✅ All manifests are valid.")
          EOF

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2: Deploy to AWS Lightsail
  # Only runs when the lint stage passes AND we are pushing to main (not on PRs).
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS Lightsail
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USERNAME }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            # Navigate to the project directory on the Lightsail server.
            # Update this path to match your actual deployment directory!
            cd /opt/odoo/restaurant-management-odoo

            # Pull latest changes
            git pull origin main

            # Update Python dependencies if uv.lock changed
            uv sync

            # Update the Odoo module in the production database
            # Replace 'your_production_db' with your actual database name!
            uv run ./odoo/odoo-bin -c odoo.conf \
              -d your_production_db \
              -u restaurant_management \
              --stop-after-init \
              --addons-path=odoo/addons,custom_addons

            # Restart Odoo service to apply changes
            sudo systemctl restart odoo
