[options]
; ============================================================
; This config file is used ONLY by the GitHub Actions CI pipeline.
; Do NOT use this for local development or production.
; ============================================================

addons_path =
admin_passwd = admin

; Use /tmp so the CI runner has full write permissions
data_dir = /tmp/odoo_data
screenshots = /tmp/odoo_screenshots

; Database — points to the test database on the Postgres service container
db_host = localhost
db_port = 5432
db_user = odoo
db_password = odoo
db_name = test_db
db_maxconn = 64
db_template = template0
db_sslmode = prefer

; Skip demo data to avoid unique constraint collisions in CI
without_demo = all

; Minimal server settings for test runner
http_enable = True
http_interface = 0.0.0.0
http_port = 8069
workers = 0
log_handler = :INFO
log_level = info
server_wide_modules = base,rpc,web
